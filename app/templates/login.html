<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Dashboard Approvisionnement</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap');

        :root {
            --bg: #f3f7fb;
            --card: #ffffff;
            --text: #13263a;
            --muted: #5c7187;
            --primary: #0b5cab;
            --primary2: #0f7ad4;
            --danger: #c23f3f;
            --border: #d9e4ef;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 10% 10%, #e9f1fb, transparent 40%),
                radial-gradient(circle at 90% 20%, #e7f6f2, transparent 35%),
                var(--bg);
            font-family: 'Manrope', sans-serif;
            color: var(--text);
            padding: 16px;
        }

        .card {
            width: min(440px, 100%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 16px 36px rgba(18, 42, 66, 0.12);
            padding: 28px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.6rem;
        }

        p {
            margin: 0 0 20px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .field {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--muted);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 12px;
            font-size: 0.95rem;
        }

        input:focus {
            outline: none;
            border-color: var(--primary2);
            box-shadow: 0 0 0 3px rgba(15, 122, 212, 0.14);
        }

        button {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            background: linear-gradient(140deg, var(--primary), var(--primary2));
            cursor: pointer;
        }

        .error {
            margin-bottom: 14px;
            background: #fff1f1;
            color: #9c2f2f;
            border: 1px solid #f0caca;
            border-radius: 10px;
            padding: 10px;
            font-size: 0.9rem;
            display: none;
        }

        .hint {
            margin-top: 14px;
            color: var(--muted);
            font-size: 0.82rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <form class="card" method="post" action="/login">
        <h1>Connexion sécurisée</h1>
        <p>Authentification requise pour accéder au dashboard.</p>

        <div id="error-box" class="error">Identifiants invalides.</div>

        <div class="field">
            <label for="username">Login</label>
            <input id="username" name="username" type="text" required autocomplete="username">
        </div>

        <div class="field">
            <label for="password">Mot de passe</label>
            <input id="password" name="password" type="password" required autocomplete="current-password">
        </div>

        <button type="submit">Se connecter</button>
        <div class="hint">Session locale sécurisée (sans base de données).</div>
    </form>

    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get('error') === '1') {
            document.getElementById('error-box').style.display = 'block';
        }
    </script>
</body>
</html>
